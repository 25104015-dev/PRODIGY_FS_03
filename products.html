<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Local Store</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <div class="logo">
        🛒 Local Store
    </div>

    <nav>

        <a href="index.html">Home</a>
        <a href="products.html" class="active">Products</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
        <a href="cart.html">
            Cart (<span id="cartCount">0</span>)
        </a>

    </nav>

</header>

<section class="page-title">

    <h1>Our Products</h1>

    <p>Fresh products from local farmers.</p>

</section>

<section class="products-section">

    <div class="search-box">

        <input
            type="text"
            id="search"
            placeholder="Search products..."
            onkeyup="searchProduct()">

    </div>

    <div class="category-buttons">

        <button onclick="filterProducts('all')">All</button>

        <button onclick="filterProducts('Fruit')">Fruits</button>

        <button onclick="filterProducts('Vegetable')">Vegetables</button>

        <button onclick="filterProducts('Dairy')">Dairy</button>

    </div>

    <div id="product-grid" class="products-grid">

        <!-- Products are loaded automatically from script.js -->

    </div>

</section>

<footer>

    <div>

        <h2>Local Store</h2>

        <p>Fresh Products from Local Farmers</p>

    </div>

    <div>

        <h3>Quick Links</h3>

        <a href="index.html">Home</a>

        <a href="products.html">Products</a>

        <a href="about.html">About Us</a>

        <a href="contact.html">Contact</a>

    </div>

    <div>

        <h3>Contact</h3>

        <p>📧 localstore@gmail.com</p>

        <p>📞 +91 9876543210</p>

    </div>

</footer>

<script src="script.js"></script>

</body>
</html>
